# CDMS NAS Worker — Docker 구동 (한 줄: docker compose up -d --build)
# 사전: .env 작성, NAS_BASE 경로가 이 호스트에 마운트되어 있어야 함(mount 모드).
services:
  nas-worker:
    build: .
    container_name: cdms-nas-worker
    env_file: .env
    restart: always
    volumes:
      # 호스트의 NAS 마운트 경로를 컨테이너에 동일 경로로 연결(rw: 폴더생성/이름변경 필요)
      - "${NAS_BASE:-/mnt/nas}:${NAS_BASE:-/mnt/nas}:rw"
