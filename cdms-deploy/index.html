function notifBadge(){const b=$('notif-badge');if(!b)return;if(NOTIF_N>0){b.textContent=NOTIF_N>99?'99+':NOTIF_N;b.style.display='';}else{b.style.display='none';}}
window.openNotif=function(){NOTIF_N=0;notifBadge();};
function notifSubscribe(){
 if(window._notifChan){try{sb.removeChannel(window._notifChan);}catch(e){}}
 const ch=sb.channel('notif-global');
 ch.on('postgres_changes',{event:'INSERT',schema:'public',table:'review_comments'},(pl)=>{
  const r=pl.new;if(!r||r.author===ME.id)return;
  NOTIF_N++;notifBadge();
  toast('💬 새 코멘트 — '+esc(r.author_name||'누군가')+(r.parent_id?' (답글)':''),()=>{if(typeof LESSONS!=='undefined'&&LESSONS.find(x=>x.id===r.lesson_id))openReview(r.lesson_id);});
 });
 ch.on('postgres_changes',{event:'UPDATE',schema:'public',table:'lessons'},(pl)=>{
  const r=pl.new,o=pl.old;if(!r||!o)return;if(r.review_ver&&r.review_ver!==o.review_ver){NOTIF_N++;notifBadge();toast('🎬 새 검수본 v'+r.review_ver+' 업로드');}
 });
 ch.subscribe();
 window._notifChan=ch;
}
function rvRefreshComments(lid){
 if(!window._RV||window._RV.lid!==lid)return;
 sb.from('review_comments').select('*').eq('lesson_id',lid).order('created_at').then(({data:cs})=>{
  if(!window._RV||window._RV.lid!==lid)return;
  const list=$('rc-list');if(list)list.innerHTML=rvComments(cs,lid);
  const cnt=$('rc-count');if(cnt)cnt.textContent='코멘트 ('+((cs||[]).length)+')';
 });
}
function rvRenderPresence(chan){
 const el=$('rv-presence');if(!el)return;let names=[];
 try{const st=chan.presenceState();Object.values(st).forEach(a=>a.forEach(x=>{if(x&&x.name)names.push(x.name);}));}catch(e){}
 const me=(USERS[ME.id]&&USERS[ME.id].name)||ME.email;
 const others=[...new Set(names)].filter(n=>n!==me);
 el.innerHTML=others.length?('👀 지금 함께 보는 중: '+others.map(esc).join(', ')):'';
}
function rvSubscribe(lid){
 if(window._rvChan){try{sb.removeChannel(window._rvChan);}catch(e){}window._rvChan=null;}
 const nm=(USERS[ME.id]&&USERS[ME.id].name)||ME.email;
 const chan=sb.channel('rv:'+lid,{config:{presence:{key:ME.id}}});
 chan.on('postgres_changes',{event:'*',schema:'public',table:'review_comments',filter:'lesson_id=eq.'+lid},()=>rvRefreshComments(lid));
 chan.on('presence',{event:'sync'},()=>rvRenderPresence(chan));
 chan.subscribe((st)=>{if(st==='SUBSCRIBED')chan.track({name:nm,id:ME.id});});
 window._rvChan=chan;
}

window.shareReview=async function(lid){

window.renameNasFolder=async function(){if(!canNasWrite()){alert('NAS 쓰기 권한이 없습니다.');return;}const old=P.nas_root;
 if(!old){alert('먼저 📁 NAS 폴더로 폴더를 생성하세요.');return;}
 const nm=($('nf-new').value||'').trim().replace(/[\\/:*?"<>|]+/g,'_');if(!nm){alert('새 폴더명을 입력하세요');return;}
 if(!confirm('NAS 폴더명을 변경합니다.\n현재: '+old+'\n새 이름: '+nm+'\n계속할까요?'))return;
 $('nf-out').innerHTML='<p class="muted">워커에 폴더명 변경 요청 중…</p>';
 const r=await nasCall('rename_folder',{old:old,new:nm});
 if(r&&r.ok){await sb.from('projects').update({nas_root:r.new}).eq('id',cur);P.nas_root=r.new;
  $('nf-out').innerHTML='<div class="file" style="background:#e6f5ec;color:#1d6e4a">✓ 변경 완료 · 새 경로: '+r.new+'</div>';}
 else $('nf-out').innerHTML='<div class="file" style="background:#fdeaea;color:#a32d2d">✗ '+((r&&r.error)||'실패 — nas-worker 확인')+'</div>';}
window.pullNasNames=async function(){$('nf-out').innerHTML='<p class="muted">NAS에서 폴더 구조를 읽는 중…</p>';
 const r=await nasCall('sync_names',{project_id:cur});
 if(r&&r.ok){$('nf-out').innerHTML='<p class="muted">NAS 단계 폴더 ('+((r.folders||[]).length)+'개):</p>'+((r.folders||[]).map(f=>'<div class="file">📁 '+esc(f)+'</div>').join('')||'<p class="muted">하위 폴더 없음</p>');}
 else $('nf-out').innerHTML='<div class="file" style="background:#fdeaea;color:#a32d2d">✗ '+((r&&r.error)||'실패 — nas-worker 확인')+'</div>';}
window.adoptNasName=async function(){const v=($('nf-adopt').value||'').trim();
 if(!v){alert('NAS의 실제 폴더 경로를 입력하세요');return;}
 await sb.from('projects').update({nas_root:v}).eq('id',cur);P.nas_root=v;
 $('nf-out').innerHTML='<div class="file" style="background:#e6f5ec;color:#1d6e4a">✓ CDMS 폴더경로를 NAS 기준으로 갱신: '+esc(v)+'</div>';}
window.openAssignees=async function(){if(!canCfg()){alert('PM·어드민 전용');return;}
 const es=refStages();
 const {data}=await sb.from('stage_assignees').select('stage_id,user_id').eq('project_id',cur);
 const cura={};(data||[]).forEach(a=>cura[a.stage_id]=a.user_id);
 const us=Object.values(USERS);
 const uopts=u=>us.map(x=>`<option value="${x.id}" ${x.id===u?'selected':''}>${esc(x.name||x.email)}</option>`).join('');
 $('modal').innerHTML=`<div class="dh"><button class="x" onclick="closeAll()">✕</button><h2>단계 담당자</h2><div class="sub">${esc(P.name)} — 단계별 담당자 (다음 담당자 자동이메일 기준)</div></div>
  <div class="dc">${es.map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dashed #eef1f5">
     <span style="min-width:96px;font-weight:700;font-size:13px">${REF_LABEL[s.id]||s.name}</span>
     <select class="f asg" data-sid="${s.id}" style="flex:1"><option value="">(미지정)</option>${uopts(cura[s.id])}</select></div>`).join('')}
   <button class="btn" onclick="saveAssignees()">저장</button>
   <p class="muted">한 단계가 완료되면 그 차시의 <b>다음 사용단계</b> 담당자에게 자동 이메일이 발송됩니다. (담당자의 이메일 주소 사용)</p></div>`;
 $('ov').classList.add('show');$('modal').classList.add('show');}
window.saveAssignees=async function(){
 const rows=[...document.querySelectorAll('.asg')].map(el=>({project_id:cur,stage_id:+el.dataset.sid,user_id:el.value||null}));
 const {error}=await sb.from('stage_assignees').upsert(rows,{onConflict:'project_id,stage_id'});
 if(error){alert('저장 실패: '+error.message);return;}
 closeAll();alert('단계 담당자 저장 완료');}
window.openNasTest=async function(){if(!canUsers()){alert('NAS 설정은 어드민 전용');return;}
 $('modal').innerHTML=`<div class="dh"><button class="x" onclick="closeAll()">✕</button><h2>NAS 설정</h2><div class="sub">검수영상 스트리밍·폴더 API용 · 어드민 전용</div></div><div class="dc"><p class="muted">불러오는 중…</p></div>`;
 $('ov').classList.add('show');$('modal').classList.add('show');
 const c=await fnCall('nas-proxy',{action:'get_config'})||{};
 const inp='width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:14px;box-sizing:border-box';
 $('modal').querySelector('.dc').innerHTML=`
   <p class="muted" style="margin:0 0 12px">NAS 계정/비번은 서버에만 저장되며(브라우저에 다시 표시되지 않음) 스트리밍·폴더 작업에 쓰입니다. 주소는 <b>외부에서 접근 가능한 HTTPS</b>(DDNS/QuickConnect)여야 합니다.</p>
   <label class="fl">NAS 주소 (HTTPS)</label><input id="nc-url" style="${inp}" value="${esc(c.url||'')}" placeholder="https://mirimlab.myds.me:4801">
   <label class="fl">FileStation 계정 <span style="color:var(--t3)">(읽기전용 권장)</span></label><input id="nc-user" style="${inp}" value="${esc(c.username||'')}" placeholder="mirim_readonly">
   <label class="fl">비밀번호 ${c.has_pw?'<span style=\'color:var(--t3)\'>· 저장됨(변경 시에만 입력)</span>':''}</label><input id="nc-pw" type="password" style="${inp}" placeholder="${c.has_pw?'그대로 두면 기존 비번 유지':'비밀번호'}">
   <label class="fl">기준 공유경로 <span style="color:var(--t3)">(선택, 폴더생성 기준)</span></label><input id="nc-base" style="${inp}" value="${esc(c.base||'')}" placeholder="/cdms">
   <div style="margin-top:14px"><button class="btn" style="width:auto;display:inline-block" onclick="saveNasCfg()">저장</button> <button class="cfg" onclick="runNasPing()">연결 테스트</button></div>
   <div id="nas-out" style="margin-top:12px"></div>`;}
window.saveNasCfg=async function(){const b={action:'save_config',url:($('nc-url').value||'').trim(),username:($('nc-user').value||'').trim(),base:($('nc-base').value||'').trim()};const pw=$('nc-pw').value;if(pw)b.password=pw;
 $('nas-out').innerHTML='<p class="muted">저장 중…</p>';
 const r=await fnCall('nas-proxy',b);
 $('nas-out').innerHTML=(r&&r.ok)?'<div class="file" style="background:#e6f5ec;color:#1d6e4a">✓ 저장되었습니다. ‘연결 테스트’로 확인하세요.</div>':'<div class="file" style="background:#fdeaea;color:#a32d2d">✗ '+((r&&r.error)||'저장 실패')+'</div>';}
window.runNasPing=async function(){$('nas-out').innerHTML='<p class="muted">NAS 연결 확인 중…</p>';
 const r=await fnCall('nas-proxy',{action:'ping'});
 if(r&&r.ok){$('nas-out').innerHTML='<div class="file" style="background:#e6f5ec;color:#1d6e4a">✓ NAS 연결 성공</div>'+((r.shares||[]).map(p=>`<div class="file">📁 ${esc(p)}</div>`).join(''));}
 else $('nas-out').innerHTML='<div class="file" style="background:#fdeaea;color:#a32d2d">✗ '+((r&&r.error)||'실패')+'</div>';}
window.changePM=function(ev,pid){if(ev)ev.stopPropagation();
 if(!canUsers()){alert('PM 변경은 어드민 전용입니다.');return;}
 const prog=PROGRAMS.find(x=>x.id===pid);if(!prog){alert('사업을 찾을 수 없습니다.');return;}
 const opts=Object.values(USERS).map(u=>`<option value="${u.id}" ${u.id===prog.pm_id?'selected':''}>${esc(u.name||u.email||'')}${u.email?' ('+esc(u.email)+')':''}</option>`).join('');
 $('modal').innerHTML=`<div class="dh"><button class="x" onclick="closeAll()">✕</button><h2>PM(담당자) 변경</h2><div class="sub">${esc(prog.name)}</div></div>
  <div class="dc"><label class="fl">담당 PM</label>
   <select id="pm-sel" style="width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:14px"><option value="">(미지정)</option>${opts}</select>
   <button class="btn" style="margin-top:14px" onclick="savePM('${prog.id}')">저장</button></div>`;
 $('ov').classList.add('show');$('modal').classList.add('show');}
window.savePM=async function(pid){const v=$('pm-sel').value||null;
 const {error}=await sb.from('programs').update({pm_id:v}).eq('id',pid);
 if(error){alert('저장 실패: '+error.message);return;}
 const p=PROGRAMS.find(x=>x.id===pid);if(p)p.pm_id=v;
 closeAll();renderOverview();}
window.closeAll=function(){if(window._rvChan){try{sb.removeChannel(window._rvChan);}catch(e){}window._rvChan=null;}try{document.querySelectorAll('#modal video').forEach(function(v){v.pause();v.removeAttribute('src');v.load();});}catch(e){}$('ov').classList.remove('show');$('modal').classList.remove('show');$('modal').classList.remove('wide');$('modal').classList.remove('rvbig');$('modal').classList.remove('rvdark');$('drawer').classList.remove('show');}
init();
</script></body></html>
