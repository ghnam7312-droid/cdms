function uname(id){const u=USERS[id];return u?u.name:'';}
function esc(v){return(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');}

window.renderOverview=function(){const y=+$('yr').value;if($('ovf'))$('ovf').value=OVFILTER;
 const _seeAll=canUsers();
 const progsYear=PROGRAMS.filter(p=>(p.year||new Date(p.created_at).getFullYear())===y).filter(p=>_seeAll||MYPROG.has(p.id)||PROJECTS.some(pj=>pj.program_id===p.id));
 const _activeProg=pr=>{const cs=PROJECTS.filter(p=>p.program_id===pr.id);let t=0,d=0;cs.forEach(p=>{const ag=AGG[p.id]||{t:0,d:0};t+=ag.t;d+=ag.d;});return (t?Math.round(d/t*100):0)<100;};
 const progs=(OVFILTER==='active'?progsYear.filter(_activeProg):progsYear.slice()).sort((a,b)=>(b.seq||0)-(a.seq||0)||(new Date(b.created_at)-new Date(a.created_at)));
 const standalone=_seeAll?PROJECTS.filter(p=>!p.program_id&&projYear(p)===y):[];
 let TT=0,TD=0,TN=0,TDUR=0;
 let slowProgN=0; const SLOW_GAP=10;
 const paceOf=(prog,ppc)=>{ if(!prog.contract_start||!prog.contract_end) return {st:'nodate'};
  const s=new Date(prog.contract_start), e=new Date(prog.contract_end); if(!(e>s)) return {st:'nodate'};
  let el=Math.round((Date.now()-s)/(e-s)*100); if(el<0)el=0; if(el>100)el=100;
  if(ppc>=100) return {st:'ok',exp:el}; const gap=el-ppc;
  return {st:gap>=SLOW_GAP?'slow':'ok',exp:el,gap}; };
 const courseRow=p=>{const a=AGG[p.id]||{t:0,d:0,n:0,dur:0};const pc=pct(a);
  const pm=p.created_by&&USERS[p.created_by]?USERS[p.created_by].name:'';

   <span class="qbar"><i style="width:${pc}%"></i></span><span class="pctn" style="color:${pc===100?'var(--done)':'var(--navy)'}">${pc}%</span>
   <span class="mini">${fmtLen(a.dur)||'-'} · ${a.d}/${a.t}</span>${canCfg()?`<button class="delbtn" onclick="deleteCourse(event,'${p.id}')" title="과정 삭제">🗑</button>`:''}</div>`;};
 let h='';
 progs.forEach(prog=>{const cs=PROJECTS.filter(p=>p.program_id===prog.id);
  let pt=0,pd=0,pdur=0,pn=0;cs.forEach(p=>{const a=AGG[p.id]||{t:0,d:0,n:0,dur:0};pt+=a.t;pd+=a.d;pdur+=a.dur;pn+=a.n;});

  const pmName=prog.pm_id&&USERS[prog.pm_id]?USERS[prog.pm_id].name:'';

  h+=`<div class="ovgroup"><div class="ovg-h" onclick="toggleProg('${prog.id}')" style="cursor:pointer"><span class="caret" id="ca-${prog.id}">▶</span><span class="nm">${prog.seq?`<span class="seqno">${String(prog.seq).padStart(3,'0')}</span>`:''}${esc(prog.name)}</span>
   <span class="meta">${prog.org_type||''}${prog.client?' · '+esc(prog.client):''}${pmName?' · PM '+esc(pmName):''} · ${cs.length}과정${prog.amount?' · <span class="amt">'+won(prog.amount)+'</span>':''}${prog.contract_end?' · 완료 '+fmtEnd(prog.contract_end):''}</span>
   ${prog.seq?((prog.approval_status==='품의완료')?`<span class="apbadge on" title="${prog.approval_no?esc(prog.approval_no):'품의완료'}">품의완료</span>`:(canCfg()?`<button class="delbtn" style="color:var(--navy);font-weight:700;font-size:12px" onclick="draftApproval(event,'${prog.id}')" title="하이웍스 전자결재로 품의 기안">기안하기</button>`:'')):''}${prog.settled?`<span class="apbadge on" title="미수금 0 · 완납">✓ 사업완료</span>`:''}${paceBadge}<span class="pct">진행률 ${ppc}%</span>${canUsers()?`<button class="delbtn" style="font-size:12px" onclick="changePM(event,'${prog.id}')" title="PM(담당자) 변경">PM변경</button><button class="delbtn" onclick="deleteProgram(event,'${prog.id}')" title="사업 삭제">🗑</button>`:''}</div>
   <div class="ovc" id="oc-${prog.id}" style="display:none">${cs.map(courseRow).join('')}${(!cs.length&&!canCfg())?'<div class="ovrow" style="cursor:default;color:var(--t3)">과정이 없습니다.</div>':''}${canCfg()?`<div class="ovrow" onclick="addCourse('${prog.id}')" style="color:var(--navy);font-weight:700">＋ 과정 추가</div>`:''}</div></div>`;});
 if(standalone.length){let st=0,sd=0;standalone.forEach(p=>{const a=AGG[p.id]||{t:0,d:0};st+=a.t;sd+=a.d;TT+=a.t;TD+=a.d;TDUR+=(a.dur||0);TN+=(a.n||0);});const spc=st?Math.round(sd/st*100):0;
  h+=`<div class="ovgroup"><div class="ovg-h" onclick="toggleProg('standalone')" style="cursor:pointer"><span class="caret" id="ca-standalone">▶</span><span class="nm">단독 과목</span><span class="meta">사업 미연결 · ${standalone.length}과정</span><span class="pct">진행률 ${spc}%</span></div><div class="ovc" id="oc-standalone" style="display:none">${standalone.map(courseRow).join('')}</div></div>`;}
 const TPC=TT?Math.round(TD/TT*100):0;
 // 요약 카드: 진행중인 과정 / 품의 미등록 / 진도 느린 사업(계약대비 -10%p)
 const allCourses=[...progs.flatMap(pr=>PROJECTS.filter(p=>p.program_id===pr.id)),...standalone];
 const courseP=p=>pct(AGG[p.id]||{t:0,d:0,n:0,dur:0});

let LESSONS=[],PSTAGES=[];
async function loadBoard(){
 const [{data:ps},{data:ls}]=await Promise.all([
  sb.from('project_stages').select('*').eq('project_id',cur),
  sb.from('lessons').select('*, lesson_stage(stage_id,status,assignee,file_mtime,file_name,updated_at,due_date), week:weeks(week_no,name), reviews(total,auto_count,by_category)').eq('project_id',cur).order('lesson_no')]);
 PSTAGES=ps||[];LESSONS=(ls||[]).sort((a,b)=>((a.week?.week_no||0)-(b.week?.week_no||0))||(a.lesson_no-b.lesson_no));

function refStages(){const en=new Set(PSTAGES.filter(x=>x.enabled).map(x=>x.stage_id));
 const ext=STAGES.filter(s=>en.has(s.id)&&!REF_ORDER.includes(s.id)).map(s=>s.id);
 return REF_ORDER.filter(id=>en.has(id)).concat(ext).map(id=>STAGES.find(s=>s.id===id)).filter(Boolean);}
function statusOf(l,sid){const r=(l.lesson_stage||[]).find(x=>x.stage_id===sid);return r?r.status:'wait';}
function rowOf(l,sid){return (l.lesson_stage||[]).find(x=>x.stage_id===sid);}
function courseAgg(){let t=0,d=0,dur=0;const es=refStages();
 LESSONS.forEach(l=>{dur+=(l.duration_sec||0);es.forEach(s=>{t++;if(statusOf(l,s.id)==='done')d++;});});
 return {t,d,dur,pc:t?Math.round(d/t*100):0};}
function stageCell(l,s){const r=rowOf(l,s.id);const st=r?r.status:'wait';const mine=owns(s.id);
 if(st==='done'){const dt=fmtMD(r.file_mtime||r.updated_at);const who=uname(r.assignee);
  return `<td class="${mine?'mine':''}"><span class="dchip done">${dt||'완료'}</span>${who?`<div class="who2">${esc(who)}</div>`:''}</td>`;}
 if(st==='prog'){const who=uname(r&&r.assignee);return `<td class="${mine?'mine':''}"><span class="dchip prog">진행</span>${who?`<div class="who2">${esc(who)}</div>`:''}</td>`;}
 if(st==='review')return `<td class="${mine?'mine':''}"><span class="dchip rev">검수</span></td>`;
 if(st==='fix')return `<td class="${mine?'mine':''}"><span class="dchip fix">수정</span></td>`;
 return `<td class="${mine?'mine':''}"><span class="wait2">·</span></td>`;}
function weekTotal(wno){let s=0;LESSONS.forEach(l=>{if(l.week?.week_no===wno)s+=(l.duration_sec||0);});return s;}
function renderCourse(){const es=refStages();const wk=P&&P.unit_label==='주차';const a=courseAgg();
 const cards=`<div class="cards">
  <div class="c"><div class="lab">전체 ${wk?'차시':UL()}</div><div class="num">${LESSONS.length}</div></div>
  <div class="c"><div class="lab">완료 단계</div><div class="num" style="color:var(--done)">${a.d}</div></div>

  <div class="c"><div class="lab">진행률</div><div class="num" style="color:var(--done)">${a.pc}%</div></div></div>`;
 let head=`<thead><tr><th class="first">${wk?'주차 / 차시명':UL()+' / 차시명'}</th><th>길이</th>${wk?'<th>총길이</th>':''}<th>형식</th>${es.map(s=>`<th class="${owns(s.id)?'mine':''}">${REF_LABEL[s.id]||s.name}</th>`).join('')}<th>비고</th></tr></thead><tbody>`;
 let h='';
 if(!LESSONS.length){h=`<tr><td class="loading" colspan="${es.length+4}">차시가 없습니다. + 새 과목으로 생성하세요.</td></tr>`;}
 else if(wk){const weeks=[...new Set(LESSONS.map(l=>l.week?.week_no))].sort((x,y)=>x-y);
  weeks.forEach(w=>{const wn=LESSONS.find(l=>l.week?.week_no===w)?.week?.name;const lw=LESSONS.filter(l=>l.week?.week_no===w);
   h+=`<tr class="wkhead"><td colspan="${es.length+4}">${w}주차${wn?' · '+esc(wn):''}</td></tr>`;
   lw.forEach((l,i)=>{h+=`<tr class="clk" onclick="openD('${l.id}')"><td class="first"><div class="ti2 sub2">${l.lesson_no}차시 · ${esc(l.title)||'(제목 미정)'}</div></td>
    <td class="len">${fmtLen(l.duration_sec)||'-'}</td>${i===0?`<td class="len" rowspan="${lw.length}">${fmtLen(weekTotal(w))||'-'}</td>`:''}<td class="fmtb">${esc(l.format)||'-'}</td>${es.map(s=>stageCell(l,s)).join('')}<td class="fmtb">${esc(l.content_type)||''}</td></tr>`;});});

 if(!LESSONS.length){alert('먼저 과목(차시)을 생성하세요.');return;}

 if(e){alert('저장 오류: '+e.error.message);return;}
 closeAll();await loadBoard();alert('차시명·영상길이 저장 완료');}

window.createProject=async function(){const name=($('np-name').value||'새 과목').trim();
 const pid=($('np-prog')&&$('np-prog').value)||null;const prog=PROGRAMS.find(p=>p.id===pid);
 const org=prog?prog.org_type:document.querySelector('input[name=np-org]:checked').value;
 const client=prog?(prog.client||''):($('np-client')?$('np-client').value.trim():'');
 const school_id=(prog&&prog.org_type==='대학'&&$('np-school')&&$('np-school').value)?$('np-school').value:null;
 const credit=document.querySelector('input[name=np-ct]:checked').value==='credit';
 const st=[...document.querySelectorAll('.npst:checked')].map(c=>+c.value).sort((a,b)=>a-b);if(!st.length){alert('단계 선택');return;}
 const ct=credit?'credit':'lesson';const ul=credit?'주차':'차시';const credits=credit?(+$('np-cr').value||0):null;
 const {data:proj,error}=await sb.from('projects').insert({name,client,org_type:org,course_type:ct,credits,unit_label:ul,created_by:ME.id,program_id:pid,school_id}).select().single();
 if(error){alert('생성 실패: '+error.message);return;}
 await sb.from('project_stages').insert(STAGES.map(s=>({project_id:proj.id,stage_id:s.id,enabled:st.includes(s.id)})));
 let lessons=[];
 if(credit){const W=+$('np-wk').value||1,L=+$('np-lpw').value||1;
  const wkRows=[];for(let w=1;w<=W;w++)wkRows.push({project_id:proj.id,week_no:w,name:null});
  const {data:weeks}=await sb.from('weeks').insert(wkRows).select();
  for(const wk of weeks)for(let j=1;j<=L;j++)lessons.push({project_id:proj.id,week_id:wk.id,lesson_no:j,title:null});
 }else{const C=+$('np-cnt').value||1;for(let i=1;i<=C;i++)lessons.push({project_id:proj.id,lesson_no:i,title:null,content_type:org});}
 const {data:lr}=await sb.from('lessons').insert(lessons).select();
 const lsRows=[];lr.forEach(l=>st.forEach(sid=>lsRows.push({lesson_id:l.id,stage_id:sid,status:'wait'})));
 await sb.from('lesson_stage').insert(lsRows);
 closeAll();await loadPrograms();await loadProjectsAll();gotoCourse(proj.id);
 alert('과목 생성·저장 완료: '+name);}

window.openInvite=function(){if(!canInvite()){alert('초대는 어드민·PM·사업담당자 전용입니다.');return;}

 const provs=PROGRAMS.filter(p=>seeAll||MYPROG.has(p.id)||PROJECTS.some(pj=>pj.program_id===p.id)).filter(_inprog).sort((a,b)=>(b.seq||0)-(a.seq||0));
 const progOpts=provs.map(p=>{const cs=PROJECTS.filter(x=>x.program_id===p.id).sort((a,b)=>(a.name||'').localeCompare(b.name||''));const ch=cs.map(c=>`<label class="rk2" style="display:flex;align-items:center;gap:6px;margin-left:24px;font-size:12px;color:var(--t2);white-space:normal"><input type="checkbox" class="ivc" data-prog="${p.id}" value="${c.id}"> <span>${esc(c.name)}</span></label>`).join('');return `<div style="border-bottom:1px solid var(--line);padding:5px 0"><label class="rk2" style="display:flex;align-items:center;gap:6px;white-space:normal;font-weight:700"><input type="checkbox" class="ivp" value="${p.id}"> <span>${p.seq?String(p.seq).padStart(3,'0')+' ':''}${esc(p.name)}</span></label>${ch}</div>`;}).join('')||'<p class="muted">선택할 사업이 없습니다.</p>';

window.makeInvite=async function(){
 const name=($('iv-name').value||'').trim(), mail=($('iv-mail').value||'').trim().toLowerCase();
 const progs=[...document.querySelectorAll('.ivp:checked')].map(c=>c.value);const courses=[...document.querySelectorAll('.ivc:checked')].map(c=>({proj:c.value,prog:c.getAttribute('data-prog')}));
 const rs=[...document.querySelectorAll('.ivr:checked')].map(c=>c.value);
 if(!mail){alert('이메일을 입력하세요');return;}
 if(!progs.length&&!courses.length){alert('담당 사업 또는 과목을 1개 이상 선택하세요');return;}
 if(!rs.length){alert('역할을 1개 이상 선택하세요');return;}
 const {data:ex}=await sb.from('users').select('id').ilike('email',mail).limit(1);
 if(!ex||!ex.length){const id=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():null;await sb.from('users').insert(id?{id,name,email:mail}:{name,email:mail});}
 const paRows=[];progs.forEach(pid=>rs.forEach(rc=>paRows.push({email:mail,program_id:pid,role_code:rc})));const ppaRows=[];courses.forEach(c=>{if(progs.includes(c.prog))return;rs.forEach(rc=>ppaRows.push({email:mail,project_id:c.proj,role_code:rc}));});
 const pe=(paRows.length?(await sb.from('pending_access').upsert(paRows,{onConflict:'email,program_id,role_code'})).error:null)||(ppaRows.length?(await sb.from('pending_proj_access').upsert(ppaRows,{onConflict:'email,project_id,role_code'})).error:null);
 if(pe){$('iv-out').innerHTML='<div class="file" style="background:#fdeaea;color:#a32d2d">배정 저장 실패: '+esc(pe.message)+'</div>';return;}
 try{const {data,error}=await sb.functions.invoke('request-access',{body:{email:mail}});
  if(error||!(data&&data.ok)){$('iv-out').innerHTML='<div class="file" style="background:#fff7e6">배정은 저장됨. 메일 발송 실패('+esc((error&&error.message)||(data&&data.reason)||'')+'). 본인이 로그인창의 "비밀번호 만들기/재설정"으로 진행해도 됩니다.</div>';return;}
  if(data.mode==='existing'){await sb.auth.resetPasswordForEmail(mail,{redirectTo:location.origin});}
  $('iv-out').innerHTML=`<div class="file" style="background:#e6f5ec;color:#1d6e4a">✓ ${esc(mail)} 메일 발송 · 사업 ${progs.length}개${(new Set(ppaRows.map(r=>r.project_id)).size)?(' · 과목 '+new Set(ppaRows.map(r=>r.project_id)).size+'개'):''} · 역할 ${rs.map(k=>ROLES[k].l).join(', ')}</div>`;
 }catch(e){$('iv-out').innerHTML='<div class="file">배정 저장됨. 메일 오류: '+esc(String(e))+'</div>';}}

window.openUsers=async function(){

  return `<tr data-q="${esc(((u.name||'')+' '+(u.email||'')).toLowerCase())}" data-roles="${rs.join(' ')}" style="border-bottom:1px solid var(--line)"><td style="padding:6px"><input id="un-${u.id}" value="${esc(u.name||'')}" style="width:84px"></td><td style="padding:6px"><input id="ue-${u.id}" value="${esc(u.email||'')}" style="width:170px"></td><td style="padding:6px;max-width:300px">${chips}</td><td style="padding:6px;text-align:center;color:var(--t3)">${pmc(u.id)}</td><td style="padding:6px;white-space:nowrap"><button class="cfg" style="padding:3px 8px;font-size:12px" onclick="inviteUser('${esc(u.email||'')}')">초대</button> <button class="cfg" style="padding:3px 8px;font-size:12px" onclick="saveUser('${u.id}')">저장</button> <button class="delbtn" onclick="delUser('${u.id}')" title="삭제">🗑</button></td></tr>`;};

 $('modal').innerHTML=`<div class="dh"><button class="x" onclick="closeAll()">✕</button><h2>사용자 관리</h2><div class="sub">전체 ${ulist.length}명 · 이름·이메일·역할 관리 · 어드민 전용</div></div>
  <div class="dc"><style>.rchip{display:inline-block;font-size:11px;padding:2px 7px;margin:2px;border-radius:10px;border:1px solid var(--line);color:var(--t2);cursor:pointer}.rchip.on{background:var(--mine-bg);color:var(--navy);border-color:var(--navy);font-weight:700}</style>
   <div style="display:flex;gap:6px;margin-bottom:10px;align-items:center"><input id="nu-name" placeholder="이름" style="width:84px"><input id="nu-email" placeholder="이메일" style="width:170px"><button class="cfg" onclick="addUser()">＋ 추가</button></div>
   <div style="display:flex;gap:6px;margin-bottom:8px;align-items:center;flex-wrap:wrap"><input id="us-q" placeholder="이름·이메일 검색" oninput="filterUsers()" style="flex:1;min-width:160px;max-width:240px"><select id="us-role" onchange="filterUsers()" class="psel" style="padding:6px 8px;max-width:160px"><option value="">전체 역할</option>${rk.map(k=>`<option value="${k}">${ROLES[k].l}</option>`).join('')}</select><span id="us-count" style="font-size:12px;color:var(--t3)"></span></div><div style="max-height:54vh;overflow:auto"><table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr style="color:var(--t3);text-align:left"><th style="padding:6px">이름</th><th style="padding:6px">이메일</th><th style="padding:6px">역할(클릭 토글)</th><th style="padding:6px">담당</th><th style="padding:6px"></th></tr></thead><tbody id="us-tbody">${ulist.map(row).join('')}</tbody></table></div>
   <details style="margin-top:12px"><summary style="cursor:pointer;color:var(--t3);font-size:12px">역할 정의 보기</summary><table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:6px">${roledef}</table></details></div>`;

window.filterUsers=function(){var qi=$('us-q'),ri=$('us-role');var q=(qi&&qi.value||'').trim().toLowerCase();var role=ri&&ri.value||'';var n=0;document.querySelectorAll('#us-tbody tr').forEach(function(tr){var okq=!q||(tr.dataset.q||'').indexOf(q)>=0;var okr=!role||((' '+(tr.dataset.roles||'')+' ').indexOf(' '+role+' ')>=0);var show=okq&&okr;tr.style.display=show?'':'none';if(show)n++;});var c=$('us-count');if(c)c.textContent=n+'명';};
window.toggleRole=async function(ev,uid,code){if(ev)ev.stopPropagation();const cur=window._urole[uid]||(window._urole[uid]=[]);const has=cur.includes(code);
 if(has){await sb.from('user_roles').delete().eq('user_id',uid).eq('role_code',code);window._urole[uid]=cur.filter(c=>c!==code);}
 else{const{error}=await sb.from('user_roles').insert({user_id:uid,role_code:code});if(error){alert('역할 변경 실패: '+error.message);return;}cur.push(code);}
 if(ev&&ev.target)ev.target.classList.toggle('on',!has);}
window.saveUser=async function(uid){const name=($('un-'+uid).value||'').trim(),email=($('ue-'+uid).value||'').trim();

window.addUser=async function(){const name=($('nu-name').value||'').trim(),email=($('nu-email').value||'').trim();if(!name){alert('이름을 입력하세요');return;}
 const id=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():null;const rv=id?{id,name,email}:{name,email};
 const{error}=await sb.from('users').insert(rv);if(error){alert('추가 실패: '+error.message);return;}openUsers();}
window.delUser=async function(uid){if(!confirm('이 사용자를 삭제할까요?\n담당 사업/기록이 있으면 삭제가 거부될 수 있습니다.'))return;
 await sb.from('user_roles').delete().eq('user_id',uid);
 const{error}=await sb.from('users').delete().eq('id',uid);if(error){alert('삭제 실패(다른 데이터가 이 사용자를 참조 중): '+error.message);return;}openUsers();}
async function nasCall(action,extra={}){
 const {data:t,error}=await sb.from('nas_tasks').insert({action,params:extra,project_id:cur,created_by:ME.id}).select().single();
 if(error)return {ok:false,error:error.message};
 for(let i=0;i<24;i++){await new Promise(r=>setTimeout(r,1500));
  const {data:row}=await sb.from('nas_tasks').select('status,result').eq('id',t.id).single();
  if(row&&row.status==='done')return {ok:true,...(row.result||{})};
  if(row&&row.status==='error')return {ok:false,error:(row.result&&row.result.error)||'작업 실패'};}
 return {ok:false,error:'시간 초과 — nas-worker가 실행 중인지 확인하세요'};}
window.createNasFolders=async function(){if(!canCfg()){alert('PM·어드민 전용');return;}
 if(!confirm('NAS에 이 과정 폴더를 생성합니다.\n'+P.name+'\n계속할까요?'))return;
 const folders=['00_문서',...refStages().map(s=>s.nas_folder)];
 const r=await nasCall('mkdir_tree',{project:P.name,folders});
 if(r&&r.ok){await sb.from('projects').update({nas_root:r.root}).eq('id',cur);P.nas_root=r.root;
  alert('NAS 폴더 생성 완료\n경로: '+r.root);}
 else alert('NAS 오류: '+((r&&r.error)||'설정 확인 필요'));}
window.syncNas=async function(){if(!P)return;
 if(!P.nas_root){alert('이 과정에 NAS 폴더가 아직 없습니다.\n먼저 "📁 NAS 폴더"로 생성하세요.');return;}
 $('pbar').innerHTML='🔄 NAS 스캔 중… 워커가 폴더를 읽는 중입니다(최대 30초). 잠시만요.';
 const r=await nasCall('scan_progress',{project_id:cur});
 if(r&&r.ok){await loadBoard();alert('NAS 동기화 완료\n완료 표기 '+(r.marked||0)+'건 · 영상길이 '+(r.durations||0)+'건 갱신'+((r.reverted)?'\n해제 '+r.reverted+'건':''));}
 else{renderCourse();alert('NAS 동기화 실패: '+((r&&r.error)||'nas-worker가 실행 중인지 확인하세요'));}}
window.openNasFolder=function(){if(!canCfg()){alert('PM·어드민 전용');return;}
 const root=P.nas_root||'';const sep=root.includes('\\')?'\\':'/';
 const base=root?root.substring(root.lastIndexOf(sep)+1):'';
 $('modal').innerHTML=`<div class="dh"><button class="x" onclick="closeAll()">✕</button><h2>NAS 폴더명 관리</h2><div class="sub">${esc(P.name)}</div></div>
  <div class="dc">
   <p class="muted" style="margin-top:0">현재 NAS 폴더<br><b style="color:var(--t1);word-break:break-all">${esc(root)||'(아직 없음 — 📁 NAS 폴더로 먼저 생성하세요)'}</b></p>
   <div class="sec" style="margin-top:8px"><h3>① CDMS → NAS · 폴더명 변경</h3>
     <div style="display:flex;gap:8px"><input id="nf-new" value="${esc(base)}" placeholder="새 폴더명" style="flex:1">
     <button class="cfg" style="white-space:nowrap" onclick="renameNasFolder()">변경(NAS 반영)</button></div>
     <p class="muted" style="font-size:11px">CDMS에서 바꾸면 워커가 NAS 실제 폴더명을 바꾸고 CDMS 경로도 함께 갱신합니다.</p></div>
   <div class="sec"><h3>② NAS → CDMS · 가져오기</h3>
     <button class="cfg" onclick="pullNasNames()">NAS 폴더 구조 불러오기</button>
     <div style="display:flex;gap:8px;margin-top:8px"><input id="nf-adopt" placeholder="NAS 실제 폴더 경로" style="flex:1">
     <button class="cfg" style="white-space:nowrap" onclick="adoptNasName()">이 경로로 CDMS 갱신</button></div>
     <p class="muted" style="font-size:11px">NAS에서 직접 바꾼 폴더명을 CDMS에 반영할 때 사용합니다.</p></div>
   <div id="nf-out"></div></div>`;
 $('ov').classList.add('show');$('modal').classList.add('show');}
window.renameNasFolder=async function(){const old=P.nas_root;
 if(!old){alert('먼저 📁 NAS 폴더로 폴더를 생성하세요.');return;}
 const nm=($('nf-new').value||'').trim().replace(/[\\/:*?"<>|]+/g,'_');if(!nm){alert('새 폴더명을 입력하세요');return;}
 if(!confirm('NAS 폴더명을 변경합니다.\n현재: '+old+'\n새 이름: '+nm+'\n계속할까요?'))return;
 $('nf-out').innerHTML='<p class="muted">워커에 폴더명 변경 요청 중…</p>';
 const r=await nasCall('rename_folder',{old:old,new:nm});
 if(r&&r.ok){await sb.from('projects').update({nas_root:r.new}).eq('id',cur);P.nas_root=r.new;
  $('nf-out').innerHTML='<div class="file" style="background:#e6f5ec;color:#1d6e4a">✓ 변경 완료 · 새 경로: '+r.new+'</div>';}
 else $('nf-out').innerHTML='<div class="file" style="background:#fdeaea;color:#a32d2d">✗ '+((r&&r.error)||'실패 — nas-worker 확인')+'</div>';}
window.pullNasNames=async function(){$('nf-out').innerHTML='<p class="muted">NAS에서 폴더 구조를 읽는 중…</p>';
 const r=await nasCall('sync_names',{project_id:cur});
 if(r&&r.ok){$('nf-out').innerHTML='<p class="muted">NAS 단계 폴더 ('+((r.folders||[]).length)+'개):</p>'+((r.folders||[]).map(f=>'<div class="file">📁 '+esc(f)+'</div>').join('')||'<p class="muted">하위 폴더 없음</p>');}
 else $('nf-out').innerHTML='<div class="file" style="background:#fdeaea;color:#a32d2d">✗ '+((r&&r.error)||'실패 — nas-worker 확인')+'</div>';}
window.adoptNasName=async function(){const v=($('nf-adopt').value||'').trim();
 if(!v){alert('NAS의 실제 폴더 경로를 입력하세요');return;}
 await sb.from('projects').update({nas_root:v}).eq('id',cur);P.nas_root=v;
 $('nf-out').innerHTML='<div class="file" style="background:#e6f5ec;color:#1d6e4a">✓ CDMS 폴더경로를 NAS 기준으로 갱신: '+esc(v)+'</div>';}
window.openAssignees=async function(){if(!canCfg()){alert('PM·어드민 전용');return;}
 const es=refStages();
 const {data}=await sb.from('stage_assignees').select('stage_id,user_id').eq('project_id',cur);
 const cura={};(data||[]).forEach(a=>cura[a.stage_id]=a.user_id);
 const us=Object.values(USERS);
 const uopts=u=>us.map(x=>`<option value="${x.id}" ${x.id===u?'selected':''}>${esc(x.name||x.email)}</option>`).join('');
 $('modal').innerHTML=`<div class="dh"><button class="x" onclick="closeAll()">✕</button><h2>단계 담당자</h2><div class="sub">${esc(P.name)} — 단계별 담당자 (다음 담당자 자동이메일 기준)</div></div>
  <div class="dc">${es.map(s=>`<div style="display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px dashed #eef1f5">
     <span style="min-width:96px;font-weight:700;font-size:13px">${REF_LABEL[s.id]||s.name}</span>
     <select class="f asg" data-sid="${s.id}" style="flex:1"><option value="">(미지정)</option>${uopts(cura[s.id])}</select></div>`).join('')}
   <button class="btn" onclick="saveAssignees()">저장</button>
   <p class="muted">한 단계가 완료되면 그 차시의 <b>다음 사용단계</b> 담당자에게 자동 이메일이 발송됩니다. (담당자의 이메일 주소 사용)</p></div>`;
 $('ov').classList.add('show');$('modal').classList.add('show');}
window.saveAssignees=async function(){
 const rows=[...document.querySelectorAll('.asg')].map(el=>({project_id:cur,stage_id:+el.dataset.sid,user_id:el.value||null}));
 const {error}=await sb.from('stage_assignees').upsert(rows,{onConflict:'project_id,stage_id'});
 if(error){alert('저장 실패: '+error.message);return;}
 closeAll();alert('단계 담당자 저장 완료');}
window.openNasTest=async function(){if(!canUsers()){alert('NAS 설정은 어드민 전용');return;}
 $('modal').innerHTML=`<div class="dh"><button class="x" onclick="closeAll()">✕</button><h2>NAS 연결 (nas-worker)</h2><div class="sub">사내 NAS · 서버 워커 경유</div></div>
  <div class="dc"><p class="muted">NAS 계정/비번은 서버 워커에만 보관됩니다. 아래로 연결 상태를 확인하세요. (파일 자동스캔 기반 진행표시는 다음 단계에서 워커와 연동됩니다.)</p>
   <button class="btn" onclick="runNasPing()">연결 테스트</button><div id="nas-out" style="margin-top:12px"></div></div>`;
 $('ov').classList.add('show');$('modal').classList.add('show');}
window.runNasPing=async function(){$('nas-out').innerHTML='<p class="muted">워커에 작업 요청 후 대기 중…</p>';
 const r=await nasCall('ping');
 if(r&&r.ok){$('nas-out').innerHTML='<div class="file" style="background:#e6f5ec;color:#1d6e4a">✓ NAS 연결 성공</div>'+((r.shares||[]).map(p=>`<div class="file">📁 ${p}</div>`).join(''));}
 else $('nas-out').innerHTML='<div class="file" style="background:#fdeaea;color:#a32d2d">✗ '+((r&&r.error)||'실패')+'</div>';}
window.changePM=function(ev,pid){if(ev)ev.stopPropagation();
 if(!canUsers()){alert('PM 변경은 어드민 전용입니다.');return;}
 const prog=PROGRAMS.find(x=>x.id===pid);if(!prog){alert('사업을 찾을 수 없습니다.');return;}
 const opts=Object.values(USERS).map(u=>`<option value="${u.id}" ${u.id===prog.pm_id?'selected':''}>${esc(u.name||u.email||'')}${u.email?' ('+esc(u.email)+')':''}</option>`).join('');
 $('modal').innerHTML=`<div class="dh"><button class="x" onclick="closeAll()">✕</button><h2>PM(담당자) 변경</h2><div class="sub">${esc(prog.name)}</div></div>
  <div class="dc"><label class="fl">담당 PM</label>
   <select id="pm-sel" style="width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:14px"><option value="">(미지정)</option>${opts}</select>
   <button class="btn" style="margin-top:14px" onclick="savePM('${prog.id}')">저장</button></div>`;
 $('ov').classList.add('show');$('modal').classList.add('show');}
window.savePM=async function(pid){const v=$('pm-sel').value||null;
 const {error}=await sb.from('programs').update({pm_id:v}).eq('id',pid);
 if(error){alert('저장 실패: '+error.message);return;}
 const p=PROGRAMS.find(x=>x.id===pid);if(p)p.pm_id=v;
 closeAll();renderOverview();}
window.closeAll=function(){$('ov').classList.remove('show');$('modal').classList.remove('show');$('drawer').classList.remove('show');}
init();
</script></body></html>
