window.upFiles=async function(fl,st,folder){
 fl=(fl||[]).filter(f=>f&&f.size!=null);if(!fl.length)return;
 if(!folder){if(st)st.innerHTML='<span style="color:var(--fix)">폴더 정보 없음</span>';return;}
 const sid0=curFileStage;let fails=0;
 for(let i=0;i<fl.length;i++){const f=fl[i];const tag=fl.length>1?('['+(i+1)+'/'+fl.length+'] '):'';
  if(f.size>25*1024*1024){ // 대용량: NAS로 직접 전송 (도착 검증 + 자동 재시도)
   let landed=false;
   for(let att=1;att<=3&&!landed;att++){
    if(st)st.innerHTML='<span class="muted">'+tag+(att>1?'재시도('+att+'/3) ':'')+'대용량 업로드 준비 중… '+esc(f.name)+'</span>';
    const t=await fnCall('nas-proxy',{action:'upload_ticket',project_id:cur,folder:folder});
    if(!t||!t.ok){if(st)st.innerHTML='<span style="color:var(--fix)">'+tag+'직접 업로드 불가: '+esc((t&&t.error)||'')+'</span>';break;}
    await new Promise(done=>{
     const fd=new FormData();fd.append('path',t.path);fd.append('create_parents','true');fd.append('overwrite','true');fd.append('file',f,f.name);
     const xhr=new XMLHttpRequest();
     xhr.open('POST',t.url+'/webapi/entry.cgi?api=SYNO.FileStation.Upload&version=2&method=upload&_sid='+encodeURIComponent(t.sid));
     // 진행률(%) 리스너를 xhr.upload에 달면 CORS preflight로 업로드가 차단되므로, 크기기반 추정 진행바로 대체.
     const _t0=Date.now();const _tau=Math.max(f.size/(8*1024*1024),3)*0.6;const _pt=()=>{if(!st)return;const el=(Date.now()-_t0)/1000;const pct=Math.min(90,Math.round(90*(1-Math.exp(-el/_tau))));st.innerHTML='<div style="text-align:left"><div class="muted" style="margin:0 0 4px">'+tag+'⬆ 업로드 중… '+esc(f.name)+' · '+pct+'% <span style="opacity:.7">('+fmtBytes(f.size)+' · '+Math.round(el)+'초)</span></div><div class="uptrack"><div class="upfill" style="width:'+pct+'%"></div></div></div>';};_pt();const _tm=setInterval(_pt,400);
     xhr.onloadend=()=>{clearInterval(_tm);done();};xhr.onerror=()=>{clearInterval(_tm);done();};
     xhr.send(fd);});
    if(st)st.innerHTML='<span class="muted">'+tag+'업로드 확인 중… '+esc(f.name)+'</span>';
    const chk=await fnCall('nas-proxy',{action:'list',path:t.scan_path});
    landed=!!(chk&&chk.ok&&(chk.files||[]).some(x=>String(x.name)===f.name));
    if(landed&&t.scan)scanAfterUpload(t.scan_path+'/'+f.name,t.dest,f.name,fl.length===1?st:null,sid0);
   }
   if(!landed){fails++;if(st)st.innerHTML='<span style="color:var(--fix)">'+tag+'업로드 실패 — 브라우저 새로고침(Ctrl+F5) 후 다시 시도해 주세요. 계속되면 관리자에게 알려주세요.</span>';}
  }else{
   if(st)st.innerHTML='<span class="muted">'+tag+'업로드 중… ('+esc(f.name)+')</span>';
   try{const b64=await new Promise((res,rej)=>{const rd=new FileReader();rd.onload=()=>res(String(rd.result).split(',').pop());rd.onerror=rej;rd.readAsDataURL(f);});
    const r=await fnCall('nas-proxy',{action:'save',project_id:cur,folder:folder,name:f.name,content:b64,lesson_id:(sid0===99?null:(window.curFileLesson||null))});
    if(r&&r.ok){if(r.scan){scanAfterUpload(r.scan_path,r.dest,r.name,fl.length===1?st:null,sid0);}
     else{if(st)st.innerHTML='<span style="color:#1d6e4a">'+tag+'✓ 저장: '+esc(r.name)+'</span>';loadStageFiles(sid0);audioAutoCheck(sid0,window.curFileLesson,f.name);}}
    else{fails++;if(st)st.innerHTML='<span style="color:var(--fix)">'+tag+'업로드 실패: '+esc((r&&r.error)||'')+'</span>';}
   }catch(e){fails++;if(st)st.innerHTML='<span style="color:var(--fix)">'+tag+'업로드 실패: '+esc(String(e&&e.message||e))+'</span>';}}
 }
 logEv('upload',{n:fl.length});
 if(fl.length>1&&st)st.innerHTML=fails?('<span style="color:var(--fix)">'+(fl.length-fails)+'개 업로드 · '+fails+'개 실패 — 🛡 백신 검사 후 순차 반영됩니다.</span>'):('<span style="color:#1d6e4a">✓ '+fl.length+'개 파일 업로드 완료 — 🛡 백신 검사 후 순차 반영됩니다.</span>');};

function parseLen(v){v=(v||'').trim();if(!v)return null;if(/^\d+$/.test(v))return +v*60;const m=v.split(':');if(m.length===2)return (+m[0]||0)*60+(+m[1]||0);if(m.length===3)return (+m[0]||0)*3600+(+m[1]||0)*60+(+m[2]||0);return null;}

/* ===== 명도대비(웹접근성) 스포이드 — WCAG AA 4.5:1 ===== */
window._CCA={};
window.ccaPick=async function(which){
 if(!window.EyeDropper){alert('이 브라우저는 스포이드(EyeDropper)를 지원하지 않습니다.\n크롬 또는 엣지 최신 버전을 사용해 주세요.');return;}
 const v=$('rv');if(v&&!v.paused)v.pause();
 try{const r=await new EyeDropper().open();window._CCA[which]=r.sRGBHex;ccaRender();}catch(e){}};
window.ccaLum=function(hex){const c=[1,3,5].map(i=>parseInt(hex.substr(i,2),16)/255).map(x=>x<=0.03928?x/12.92:Math.pow((x+0.055)/1.055,2.4));return 0.2126*c[0]+0.7152*c[1]+0.0722*c[2];};
window.ccaRender=function(){const c=window._CCA||{};const el=$('cca-res');if(!el)return;
 if($('cca-fg'))$('cca-fg').style.background=c.fg||'#fff';
 if($('cca-bg'))$('cca-bg').style.background=c.bg||'#fff';
 if(c.fg&&c.bg){const l1=ccaLum(c.fg),l2=ccaLum(c.bg);const ratio=(Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05);const ok=ratio>=4.5;
  el.innerHTML='명도대비 <b style="font-size:14px;color:#fff">'+ratio.toFixed(2)+':1</b> '+(ok?'<span style="color:#3fbf7f;font-weight:700">✓ 통과 (4.5:1 이상)</span>':'<span style="color:#ff6b60;font-weight:700">✗ 미달 (기준 4.5:1)</span>')+' <span style="color:#8a94a6">'+esc(c.fg)+' / '+esc(c.bg)+'</span>';}
 else el.innerHTML='영상을 일시정지한 뒤, 글자색·배경색을 스포이드로 클릭하세요 (기준 4.5:1)';};

/* ===== POC 개선의견 (화면 영역캡처 + 텍스트) ===== */
window._pocImg=null;
window.pocSan=function(html){const ALLOW={B:1,I:1,U:1,S:1,STRONG:1,EM:1,BR:1,P:1,DIV:1,UL:1,OL:1,LI:1,SPAN:1,FONT:1,A:1};
 const doc=new DOMParser().parseFromString('<div>'+String(html||'')+'</div>','text/html');
 const walk=(node)=>{[...node.childNodes].forEach(ch=>{
  if(ch.nodeType===3)return;
  if(ch.nodeType!==1||!ALLOW[ch.tagName]){node.replaceChild(document.createTextNode(ch.textContent||''),ch);return;}
  [...ch.attributes].forEach(a=>{const n=a.name.toLowerCase();
   if(n==='href'&&ch.tagName==='A'){if(!/^https?:/i.test(a.value))ch.removeAttribute(a.name);}
   else if(n==='style'){const m=/color:\s*([^;]+)/i.exec(a.value);if(m)ch.setAttribute('style','color:'+m[1]);else ch.removeAttribute('style');}
   else if(n==='color'&&ch.tagName==='FONT'){}
   else ch.removeAttribute(a.name);});
  if(ch.tagName==='A'){ch.setAttribute('target','_blank');ch.setAttribute('rel','noopener');}
  walk(ch);});};
 const root=doc.body.firstChild;walk(root);return root.innerHTML;};

 const trash=!!window._pocTrash; // 휴지통 보기(어드민): 삭제된 의견만 표시·복원 가능
 let q=sb.from('poc_feedback').select('id,no,created_at,user_id,user_name,page,content,image_b64,status,deleted_at').order('created_at',{ascending:false}).limit(100);
 q=trash?q.not('deleted_at','is',null):q.is('deleted_at',null);
 const{data,error}=await q;
 const el=$('poc-list');if(!el)return;
 if(error){el.innerHTML='<p class="muted">불러오기 실패: '+esc(error.message)+'</p>';return;}
 const tb=$('poc-trash-btn');if(tb){tb.style.display=window.ISADMIN?'':'none';tb.textContent=trash?'← 의견 목록으로':'🗑 휴지통';}
 let RP={};const _ids=(data||[]).map(r=>r.id);
 if(_ids.length){const{data:reps}=await sb.from('poc_replies').select('*').in('feedback_id',_ids).order('created_at');(reps||[]).forEach(x=>{(RP[x.feedback_id]=RP[x.feedback_id]||[]).push(x);});}
 const cnt=$('poc-cnt');if(cnt)cnt.textContent='('+((data||[]).length)+(trash?' · 휴지통':'')+')';
 (data||[]).sort((a,b)=>((a.status==='final')?1:0)-((b.status==='final')?1:0)); // 최종 완료는 아래로
 el.innerHTML=(data||[]).map(r=>{const mine=ME&&r.user_id===ME.id;const done=r.status==='done';const fin=r.status==='final';
  return `<div style="border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;${fin?'opacity:.45':done?'opacity:.55':''}">
   <div style="display:flex;gap:8px;align-items:center;font-size:12px;color:var(--t3);flex-wrap:wrap"><span style="background:#4b3fbb;color:#fff;font-weight:800;font-size:11px;padding:1px 7px;border-radius:9px">#${r.no||'-'}</span><b style="color:var(--navy)">${esc(r.user_name||'')}</b><span>${fmtMD(r.created_at)}</span><span>${esc(r.page||'')}</span>${fin?'<span class="apbadge on" style="background:#3b2f78">🏁 최종 완료</span>':done?'<span class="apbadge on">처리완료</span>':''}
    <span style="margin-left:auto;white-space:nowrap">${trash?(window.ISADMIN?`<button class="delbtn" style="font-size:12px" onclick="pocRestore('${r.id}')" title="휴지통에서 복원">↩ 복원</button>`:''):`${window.ISADMIN?(fin?`<button class="delbtn" style="font-size:12px" onclick="pocToggle('${r.id}','open')">↩ 다시열기</button> `:done?`<button class="delbtn" style="font-size:12px" onclick="pocToggle('${r.id}','final')">🏁 최종 완료</button> <button class="delbtn" style="font-size:12px" onclick="pocToggle('${r.id}','open')">↩ 다시열기</button> `:`<button class="delbtn" style="font-size:12px" onclick="pocToggle('${r.id}','done')">✔ 처리완료</button> `):''}${(mine||window.ISADMIN)?`<button class="delbtn" style="font-size:12px" onclick="pocEdit('${r.id}')" title="내용 수정">✏ 내용 수정</button> <button class="delbtn" onclick="pocDel('${r.id}')" title="삭제(휴지통)">🗑</button>`:''}`}</span></div>
   <div id="poc-c-${r.id}" style="font-size:13.5px;margin-top:6px;white-space:pre-wrap">${pocSan(r.content)}</div>
   ${r.image_b64?`<img src="${r.image_b64}" style="max-width:100%;max-height:180px;margin-top:8px;border:1px solid var(--line);border-radius:8px;cursor:zoom-in" onclick="pocZoom(this.src)">`:''}
   <div style="margin-top:8px;border-top:1px dashed var(--line);padding-top:6px">
    ${(RP[r.id]||[]).map(x=>`<div style="font-size:12.5px;padding:3px 0"><b style="color:var(--navy)">↳ ${esc(x.user_name||'')}</b> <span style="color:var(--t3);font-size:11px">${fmtMD(x.created_at)}</span>${((ME&&x.user_id===ME.id)||window.ISADMIN)?` <button class="delbtn" style="font-size:11px" onclick="pocRepDel('${x.id}')" title="답변 삭제">🗑</button>`:''}<div style="white-space:pre-wrap;margin-left:16px">${pocSan(x.content)}</div></div>`).join('')}
    <div style="margin-top:6px">${pocTB('poc-rep-'+r.id)}<div style="display:flex;gap:6px;align-items:flex-end"><div id="poc-rep-${r.id}" contenteditable="true" data-ph="답변 입력… (Ctrl+Enter 등록)" onkeydown="if(event.ctrlKey&&event.key==='Enter')pocReply('${r.id}')" style="flex:1;min-height:34px;padding:6px 8px;border:1px solid var(--line);border-radius:8px;font-size:12.5px;background:#fff"></div><button class="cfg" style="padding:6px 10px;font-size:12px;white-space:nowrap" onclick="pocReply('${r.id}')">💬 답변</button></div></div>
   </div>
  </div>`;}).join('')||'<p class="muted">아직 등록된 의견이 없습니다.</p>';};
window.pocSave=async function(){
 const _ed=$('poc-txt');const txt=pocSan(_ed?_ed.innerHTML:'');if(!(((_ed&&_ed.textContent)||'').trim())){alert('의견 내용을 입력해 주세요.');return;}
 const st=$('poc-st');if(st)st.textContent='저장 중…';
 const row={user_id:ME.id,user_name:(USERS[ME.id]&&USERS[ME.id].name)||ME.email,user_email:ME.email,page:(VIEW==='course'&&P)?('과정: '+P.name):'전체 진행표',build:CDMS_BUILD,content:txt,image_b64:window._pocImg};
 const{error}=await sb.from('poc_feedback').insert(row);
 if(error){if(st)st.textContent='';alert('저장 실패: '+error.message);return;}
 logEv('poc');window._pocImg=null;if($('poc-txt'))$('poc-txt').innerHTML='';$('poc-prev').innerHTML='';if(st){st.textContent='✅ 등록되었습니다';setTimeout(()=>{const s=$('poc-st');if(s)s.textContent='';},2500);}
 pocLoad();};
window.pocDel=async function(id){if(!confirm('이 의견을 삭제할까요?\n(휴지통으로 이동하며, 어드민이 복원할 수 있습니다)'))return;const{error}=await sb.from('poc_feedback').update({deleted_at:new Date().toISOString()}).eq('id',id);if(error){alert('삭제 실패: '+error.message);return;}pocLoad();};
window.pocRestore=async function(id){const{error}=await sb.from('poc_feedback').update({deleted_at:null}).eq('id',id);if(error){alert('복원 실패: '+error.message);return;}pocLoad();};
window.pocTrashToggle=function(){window._pocTrash=!window._pocTrash;pocLoad();};
window.pocReply=async function(fid){const inp=$('poc-rep-'+fid);const v=pocSan(inp?inp.innerHTML:'');if(!(((inp&&inp.textContent)||'').trim())){alert('답변 내용을 입력하세요.');return;}if(inp)inp.contentEditable='false';
 const r=await fnCall('poc-notify',{action:'reply',feedback_id:fid,content:v});
 if(!r||!r.ok){alert('답변 등록 실패: '+((r&&r.error)||'네트워크 오류'));if(inp)inp.contentEditable='true';return;}
 pocLoad();};
window.pocRepDel=async function(id){if(!confirm('이 답변을 삭제할까요?'))return;const{error}=await sb.from('poc_replies').delete().eq('id',id);if(error){alert('삭제 실패: '+error.message);return;}pocLoad();};
window.pocToggle=async function(id,st){const r=await fnCall('poc-notify',{action:'update',id:id,set:{status:st}});if(!r||!r.ok){alert('변경 실패: '+((r&&r.error)||'네트워크 오류'));return;}pocLoad();};
window.pocEdit=function(id){const d=$('poc-c-'+id);if(!d||d.dataset.editing)return;d.dataset.editing='1';const old=d.innerHTML;d.innerHTML='';
 const tb=document.createElement('div');tb.innerHTML=pocTB('poc-ed-'+id);
 const ta=document.createElement('div');ta.id='poc-ed-'+id;ta.contentEditable='true';ta.innerHTML=old;ta.style.cssText='width:100%;box-sizing:border-box;min-height:70px;padding:8px;border:1px solid var(--line);border-radius:8px;font-size:13.5px;font-family:inherit;background:#fff';
 const sv=document.createElement('button');sv.className='cfg';sv.textContent='저장';sv.style.cssText='margin-top:6px;padding:4px 12px;font-size:12px';
 const cc=document.createElement('button');cc.className='cfg';cc.textContent='취소';cc.style.cssText='margin-top:6px;margin-left:6px;padding:4px 12px;font-size:12px';cc.onclick=()=>pocLoad();
 sv.onclick=async()=>{const nv=pocSan(ta.innerHTML);if(!ta.textContent.trim()){alert('내용을 입력하세요');return;}sv.disabled=true;sv.textContent='저장 중…';const r=await fnCall('poc-notify',{action:'update',id:id,set:{content:nv}});if(!r||!r.ok){alert('수정 실패: '+((r&&r.error)||'네트워크 오류'));sv.disabled=false;sv.textContent='저장';return;}pocLoad();};
 d.appendChild(tb);d.appendChild(ta);d.appendChild(sv);d.appendChild(cc);};
window.pocZoom=function(src){const d=document.createElement('div');d.style.cssText='position:fixed;inset:0;background:rgba(10,14,22,.88);z-index:300;display:flex;align-items:center;justify-content:center;cursor:zoom-out';d.onclick=()=>d.remove();const im=document.createElement('img');im.src=src;im.style.cssText='max-width:96vw;max-height:96vh;border-radius:8px';d.appendChild(im);document.body.appendChild(d);};
window.pocPrev=function(){const pv=$('poc-prev');if(!pv)return;pv.innerHTML='';if(!window._pocImg)return;
 const bx=document.createElement('div');bx.style.cssText='position:relative;display:inline-block';
 const im=document.createElement('img');im.src=window._pocImg;im.style.cssText='max-width:100%;max-height:200px;border:1px solid var(--line);border-radius:8px';
 const del=document.createElement('button');del.textContent='🗑';del.className='delbtn';del.style.cssText='position:absolute;top:4px;right:4px;background:#fff;border-radius:6px';del.onclick=()=>{window._pocImg=null;pv.innerHTML='';};
 bx.appendChild(im);bx.appendChild(del);pv.appendChild(bx);};
window.pocAttach=function(input){const f=input.files&&input.files[0];input.value='';if(!f)return;
 if(!/^image\//.test(f.type||'')){alert('이미지 파일만 첨부할 수 있습니다. (png·jpg 등)');return;}
 const rd=new FileReader();rd.onload=()=>{const img=new Image();img.onload=()=>{
  const mw=1600,sc=img.width>mw?mw/img.width:1;
  const c=document.createElement('canvas');c.width=Math.max(1,Math.round(img.width*sc));c.height=Math.max(1,Math.round(img.height*sc));
  const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0,c.width,c.height);
  window._pocImg=c.toDataURL('image/jpeg',0.85);pocPrev();};
  img.onerror=()=>alert('이미지를 읽을 수 없습니다.');img.src=String(rd.result);};
 rd.readAsDataURL(f);};
window.pocCapture=async function(){
 if(!navigator.mediaDevices||!navigator.mediaDevices.getDisplayMedia){alert('이 브라우저는 화면 캡처를 지원하지 않습니다. 크롬/엣지를 사용해 주세요.');return;}
 let stream;
 try{stream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:false,preferCurrentTab:true});}catch(e){return;}
 // 2단계 캡처: POC 창을 내리고, 원하는 화면으로 이동한 뒤 '지금 캡처'를 누르는 방식
 const p=$('pocpanel');if(p)p.style.display='none';
 const bar=document.createElement('div');bar.id='poc-capbar';
 bar.style.cssText='position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:300;background:#1f2430;color:#fff;padding:9px 14px;border-radius:24px;display:flex;gap:10px;align-items:center;box-shadow:0 8px 24px rgba(0,0,0,.4);font-size:13px;white-space:nowrap';
 const lbl=document.createElement('span');lbl.textContent='📸 원하는 화면·팝업을 연 뒤 캡처하세요';bar.appendChild(lbl);
 const go=document.createElement('button');go.textContent='📷 지금 캡처';go.style.cssText='background:#d9534f;color:#fff;border:0;border-radius:16px;padding:6px 14px;font-weight:700;cursor:pointer';
 const cancel=document.createElement('button');cancel.textContent='취소';cancel.style.cssText='background:#3a4154;color:#fff;border:0;border-radius:16px;padding:6px 12px;cursor:pointer';
 bar.appendChild(go);bar.appendChild(cancel);document.body.appendChild(bar);
 const stop=()=>{try{stream.getTracks().forEach(t=>t.stop());}catch(e){}};
 const restore=()=>{bar.remove();if(p)p.style.display='block';};
 try{const tr=stream.getVideoTracks()[0];if(tr)tr.onended=restore;}catch(e){}
 cancel.onclick=()=>{stop();restore();};
 go.onclick=async()=>{
  try{
   bar.style.visibility='hidden';
   const v=document.createElement('video');v.srcObject=stream;v.muted=true;await v.play();
   await new Promise(r=>setTimeout(r,150));
   const c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;
   c.getContext('2d').drawImage(v,0,0);
   stop();bar.remove();
   pocRegion(c); // 영역 선택 후 fin()에서 POC 창 복원
  }catch(e){stop();restore();alert('캡처 실패: '+e.message);}};};
window.pocRegion=function(src){
 const W=window.innerWidth,H=window.innerHeight;
 const wrap=document.createElement('div');wrap.style.cssText='position:fixed;inset:0;z-index:300;background:#0b0f16;cursor:crosshair;user-select:none';
 const scale=Math.min(W/src.width,H/src.height);
 const dw=Math.round(src.width*scale),dh=Math.round(src.height*scale);
 const ox=Math.round((W-dw)/2),oy=Math.round((H-dh)/2);
 const cv=document.createElement('canvas');cv.width=W;cv.height=H;wrap.appendChild(cv);
 const hint=document.createElement('div');hint.style.cssText='position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;pointer-events:none';hint.textContent='마우스로 남길 영역을 드래그하세요 · ESC 취소';wrap.appendChild(hint);
 const btns=document.createElement('div');btns.style.cssText='position:absolute;display:none;gap:8px';
 const ok=document.createElement('button');ok.textContent='✔ 이 영역 사용';ok.style.cssText='background:#7c5cff;color:#fff;border:0;border-radius:8px;padding:8px 14px;font-weight:700;cursor:pointer';
 const no=document.createElement('button');no.textContent='취소';no.style.cssText='background:#333a4a;color:#fff;border:0;border-radius:8px;padding:8px 14px;cursor:pointer';
 btns.appendChild(ok);btns.appendChild(no);wrap.appendChild(btns);
 const ctx=cv.getContext('2d');let sx=0,sy=0,ex=0,ey=0,drag=false,hasSel=false;
 function draw(){ctx.fillStyle='#0b0f16';ctx.fillRect(0,0,W,H);ctx.drawImage(src,ox,oy,dw,dh);ctx.fillStyle='rgba(8,10,16,.55)';ctx.fillRect(0,0,W,H);
  if(drag||hasSel){const x=Math.min(sx,ex),y=Math.min(sy,ey),w=Math.abs(ex-sx),h=Math.abs(ey-sy);if(w>2&&h>2){const ix=(x-ox)/scale,iy=(y-oy)/scale;ctx.drawImage(src,ix,iy,w/scale,h/scale,x,y,w,h);ctx.strokeStyle='#7c5cff';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);}}}
 cv.onmousedown=e=>{drag=true;hasSel=false;sx=ex=e.clientX;sy=ey=e.clientY;btns.style.display='none';draw();};
 cv.onmousemove=e=>{if(!drag)return;ex=e.clientX;ey=e.clientY;draw();};
 cv.onmouseup=e=>{if(!drag)return;drag=false;ex=e.clientX;ey=e.clientY;
  if(Math.abs(ex-sx)<8||Math.abs(ey-sy)<8){hasSel=false;draw();return;}
  hasSel=true;draw();btns.style.left=Math.min(Math.min(sx,ex),W-190)+'px';btns.style.top=Math.min(Math.max(sy,ey)+10,H-52)+'px';btns.style.display='flex';};
 function fin(){wrap.remove();document.removeEventListener('keydown',esch);const pp=$('pocpanel');if(pp){pp.style.display='block';pp.style.visibility='';}}
 const esch=e=>{if(e.key==='Escape')fin();};document.addEventListener('keydown',esch);
 no.onclick=fin;
 ok.onclick=()=>{const x=Math.min(sx,ex),y=Math.min(sy,ey),w=Math.abs(ex-sx),h=Math.abs(ey-sy);
  let ix=Math.max(0,(x-ox)/scale),iy=Math.max(0,(y-oy)/scale);
  let iw=Math.min(src.width-ix,w/scale),ih=Math.min(src.height-iy,h/scale);
  if(iw<4||ih<4){fin();return;}
  const mw=1600,os=iw>mw?mw/iw:1;
  const out=document.createElement('canvas');out.width=Math.round(iw*os);out.height=Math.round(ih*os);
  out.getContext('2d').drawImage(src,ix,iy,iw,ih,0,0,out.width,out.height);
  window._pocImg=out.toDataURL('image/jpeg',0.85);fin();
  const pv=$('poc-prev');if(pv){pv.innerHTML='';const bx=document.createElement('div');bx.style.cssText='position:relative;display:inline-block';const im=document.createElement('img');im.src=window._pocImg;im.style.cssText='max-width:100%;max-height:200px;border:1px solid var(--line);border-radius:8px';const del=document.createElement('button');del.textContent='🗑';del.className='delbtn';del.style.cssText='position:absolute;top:4px;right:4px;background:#fff;border-radius:6px';del.onclick=()=>{window._pocImg=null;pv.innerHTML='';};bx.appendChild(im);bx.appendChild(del);pv.appendChild(bx);}};
 draw();document.body.appendChild(wrap);};
init();
</script></body></html>
